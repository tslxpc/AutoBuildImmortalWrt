# 康佳Komi-A31/移动A10专属 ImmortalWrt 构建工作流
# 仅支持：konka_komi-a31、cmcc_a10、cmcc_a10-stock、cmcc_a10-ubootmod
# 默认使用 luci 24.10.x 构建，移动A10自动切换 23.05.4
name: Build ImmortalWrt (A31/A10 Only)

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        description: "请选择路由器型号"
        required: true
        options:
          - konka_komi-a31
          - cmcc_a10
          - cmcc_a10-stock
          - cmcc_a10-ubootmod
        default: konka_komi-a31
      custom_router_ip:
        description: "请设置路由器的管理地址 格式:192.168.x.1 或 10.x.x.1"
        required: true
        default: "192.168.100.1"
      default_hostname:
        description: "设置默认主机名 (不填则为 ImmortalWrt)"
        required: false
        default: ""
      default_password:
        description: "设置默认root密码 (留空则使用ImmortalWrt默认空密码)"
        required: false
        default: ""
      wifi_ssid:
        description: "WiFi名称 (双频合一，不填则为 TSLXPC)"
        required: false
        default: "TSLXPC"
      wifi_password:
        description: "WiFi密码 (至少8位，不填则为 00658205)"
        required: false
        default: "00658205"
      enable_store:
        description: "集成 iStore 商店"
        required: false
        type: boolean
        default: true
      enable_netbird:
        description: "集成 NetBird 内网穿透"
        required: false
        type: boolean
        default: true
      include_docker:
        description: "是否编译 Docker 插件"
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "是否配置PPPoE拨号信息?"
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      pppoe_account:
        description: "宽带账号 (若启用PPPoE)"
        required: false
      pppoe_password:
        description: "宽带密码 (若启用PPPoE)"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/mediatek-filogic/build24.sh

      - name: Save Custom Router IP
        run: |
          mkdir -p "${{ github.workspace }}/custom"
          echo "${{ github.event.inputs.custom_router_ip }}" > "${{ github.workspace }}/custom/custom_router_ip.txt"

      - name: Validate PPPoE Inputs
        run: |
          if [[ "${{ inputs.enable_pppoe }}" == "yes" ]]; then
            [[ -z "${{ inputs.pppoe_account }}" || -z "${{ inputs.pppoe_password }}" ]] && exit 1
          fi

      - name: Enable iStore integration
        run: |
          if [ "${{ github.event.inputs.enable_store }}" == "true" ]; then
            echo 'CUSTOM_PACKAGES="$CUSTOM_PACKAGES luci-app-store"' >> shell/custom-packages.sh
            echo "✅ iStore商店集成成功"
          fi

      # MT7981 专属：自动下载 NetBird (aarch64_generic 架构)
      - name: Auto download NetBird IPK
        run: |
          if [ "${{ github.event.inputs.enable_netbird }}" == "true" ]; then
            mkdir -p ${{ github.workspace }}/shell/packages
            arch="aarch64_generic"
            
            # 下载对应架构IPK（带重试和超时）
            wget -q --tries=3 --timeout=10 \
              "https://github.com/tslxpc/openwrt-netbird/releases/download/v0.70.5/netbird_0.70.5-r1_${arch}.ipk" \
              -O "${{ github.workspace }}/shell/packages/netbird.ipk"
            
            # 添加WireGuard运行依赖
            echo 'CUSTOM_PACKAGES="$CUSTOM_PACKAGES kmod-wireguard wireguard-tools"' >> shell/custom-packages.sh
            echo "✅ NetBird内网穿透集成成功 | 架构: $arch"
          fi

      # 修复NetBird init脚本依赖缺失问题
      - name: Fix NetBird init script dependency
        run: |
          if [ "${{ github.event.inputs.enable_netbird }}" == "true" ]; then
            # 创建缺失的netifd-proto.sh文件（空文件即可满足依赖）
            mkdir -p "${{ github.workspace }}/custom/lib/netifd"
            touch "${{ github.workspace }}/custom/lib/netifd/netifd-proto.sh"
            echo "✅ 已修复NetBird init脚本依赖缺失问题"
          fi

      # 生成默认root密码设置脚本
      - name: Generate Default Root Password Script
        run: |
          if [ -n "${{ github.event.inputs.default_password }}" ]; then
            cat > "${{ github.workspace }}/glinet/99-set-root-password" << EOF
          #!/bin/sh
          # 自动设置默认root密码
          (echo "${{ github.event.inputs.default_password }}"; sleep 1; echo "${{ github.event.inputs.default_password }}") | passwd root > /dev/null
          rm -f /etc/uci-defaults/99-set-root-password
          EOF
            chmod +x "${{ github.workspace }}/glinet/99-set-root-password"
            echo "✅ 默认root密码设置成功"
          fi

      # ✅ 最终修复版：双频合一WiFi配置（彻底解决迁移设置提示）
      - name: Generate Final Dual-Band WiFi Script
        run: |
          if [ -n "${{ github.event.inputs.wifi_ssid }}" ]; then
            SSID="${{ github.event.inputs.wifi_ssid }}"
            PASSWORD="${{ github.event.inputs.wifi_password }}"
            
            cat > "${{ github.workspace }}/glinet/99-set-dualband-wifi" << EOF
          #!/bin/sh
          # 最终修复版：MT7981双频合一WiFi自动配置
          # 彻底解决无线页面"迁移设置"提示问题
          
          # 1. 停止无线服务
          /etc/init.d/wireless stop
          
          # 2. 完全删除现有无线配置（关键！让系统重新生成标准mtwifi配置）
          rm -f /etc/config/wireless
          
          # 3. 让系统自动检测无线设备并生成标准mtwifi-cfg配置
          wifi config
          
          # 4. 启用radio0(2.4G)和radio1(5G)设备
          uci set wireless.radio0.disabled='0'
          uci set wireless.radio1.disabled='0'
          
          # 5. 设置国家代码和功率（符合中国法规）
          uci set wireless.radio0.country='CN'
          uci set wireless.radio0.txpower='20'
          uci set wireless.radio0.htmode='HT20'  # 2.4G用HT20减少干扰
          
          uci set wireless.radio1.country='CN'
          uci set wireless.radio1.txpower='23'
          uci set wireless.radio1.htmode='HE160' # 5G开启160MHz满速
          
          # 6. 修改默认无线接口的SSID和密码
          # 系统自动生成的接口名称是default_radio0和default_radio1
          uci set wireless.default_radio0.ssid='$SSID'
          uci set wireless.default_radio0.encryption='sae-mixed'
          uci set wireless.default_radio0.key='$PASSWORD'
          uci set wireless.default_radio0.disabled='0'
          
          uci set wireless.default_radio1.ssid='$SSID'
          uci set wireless.default_radio1.encryption='sae-mixed'
          uci set wireless.default_radio1.key='$PASSWORD'
          uci set wireless.default_radio1.disabled='0'
          
          # 7. 启用802.11r/k/v/w无缝漫游（双频合一必备）
          for iface in default_radio0 default_radio1; do
            uci set wireless.\$iface.ieee80211r='1'
            uci set wireless.\$iface.mobility_domain='a1b2'
            uci set wireless.\$iface.ft_over_ds='1'
            uci set wireless.\$iface.ft_psk_generate_local='1'
            uci set wireless.\$iface.ieee80211k='1'
            uci set wireless.\$iface.ieee80211v='1'
            uci set wireless.\$iface.bss_transition='1'
            uci set wireless.\$iface.ieee80211w='1'
          done
          
          # 8. 提交配置并重启无线服务
          uci commit wireless
          /etc/init.d/wireless start
          
          # 9. 删除自身，避免重复执行
          rm -f /etc/uci-defaults/99-set-dualband-wifi
          EOF
            chmod +x "${{ github.workspace }}/glinet/99-set-dualband-wifi"
            echo "✅ 最终修复版双频合一WiFi配置成功 | SSID: $SSID"
            echo "✅ 已彻底解决无线页面迁移设置提示"
            echo "✅ 已启用802.11r/k/v/w无缝漫游"
          fi

      # 生成默认主机名配置脚本
      - name: Generate Default Hostname Script
        run: |
          if [ -n "${{ github.event.inputs.default_hostname }}" ]; then
            cat > "${{ github.workspace }}/glinet/99-set-hostname" << EOF
          #!/bin/sh
          # 自动设置默认主机名
          uci set system.@system[0].hostname='${{ github.event.inputs.default_hostname }}'
          uci commit system
          rm -f /etc/uci-defaults/99-set-hostname
          EOF
            chmod +x "${{ github.workspace }}/glinet/99-set-hostname"
            echo "✅ 默认主机名设置为: ${{ github.event.inputs.default_hostname }}"
          fi

      # 生成NetBird专属网络接口和防火墙配置脚本
      - name: Generate NetBird Network & Firewall Script
        run: |
          if [ "${{ github.event.inputs.enable_netbird }}" == "true" ]; then
            cat > "${{ github.workspace }}/glinet/99-config-netbird-network" << EOF
          #!/bin/sh
          # 自动配置NetBird网络接口和防火墙规则
          
          # 1. 创建netbird接口（绑定wt0设备，不配置协议）
          uci set network.netbird=interface
          uci set network.netbird.device='wt0'
          uci set network.netbird.proto='none'
          uci set network.netbird.auto='1'
          uci commit network
          
          # 2. 创建netbird防火墙区域
          uci add firewall zone
          uci set firewall.@zone[-1].name='netbird'
          uci set firewall.@zone[-1].network='netbird'
          uci set firewall.@zone[-1].input='ACCEPT'
          uci set firewall.@zone[-1].output='ACCEPT'
          uci set firewall.@zone[-1].forward='ACCEPT'
          uci set firewall.@zone[-1].masq='1'        # 开启动态伪装
          uci set firewall.@zone[-1].mtu_fix='1'    # 开启MSS钳制
          
          # 3. 添加转发规则：允许netbird与lan双向互通
          uci add firewall forwarding
          uci set firewall.@forwarding[-1].src='netbird'
          uci set firewall.@forwarding[-1].dest='lan'
          
          uci add firewall forwarding
          uci set firewall.@forwarding[-1].src='lan'
          uci set firewall.@forwarding[-1].dest='netbird'
          
          # 提交防火墙配置
          uci commit firewall
          
          # 删除自身
          rm -f /etc/uci-defaults/99-config-netbird-network
          EOF
            chmod +x "${{ github.workspace }}/glinet/99-config-netbird-network"
            echo "✅ NetBird网络接口和防火墙配置成功"
          fi

      - name: Build ImmortalWrt Firmware
        run: |
          profile="${{ github.event.inputs.profile }}"
          include_docker="${{ github.event.inputs.include_docker }}"
          echo "platform=mediatek/filogic" >> $GITHUB_ENV
          tag="mediatek-filogic-openwrt-24.10.6"

          # 移动A10系列自动切换到23.05.4（兼容性更好）
          case "$profile" in
            cmcc_a10|cmcc_a10-stock|cmcc_a10-ubootmod)
              tag=mediatek-filogic-openwrt-23.05.4
              cp ${{ github.workspace }}/mediatek-filogic/build23.sh ${{ github.workspace }}/mediatek-filogic/build24.sh ;;
          esac

          # 启动Docker构建
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/glinet:/home/build/immortalwrt/files/etc/uci-defaults" \
            -v "${{ github.workspace }}/custom:/home/build/immortalwrt/files/etc/config" \
            -v "${{ github.workspace }}/arch/arch.conf:/home/build/immortalwrt/files/etc/opkg/arch.conf" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/shell/packages:/home/build/immortalwrt/packages" \
            -v "${{ github.workspace }}/mediatek-filogic/build24.sh:/home/build/immortalwrt/build.sh" \
            -e PROFILE="$profile" \
            -e INCLUDE_DOCKER="$include_docker" \
            -e ENABLE_PPPOE="${{ inputs.enable_pppoe }}" \
            -e PPPOE_ACCOUNT="${{ inputs.pppoe_account }}" \
            -e PPPOE_PASSWORD="${{ inputs.pppoe_password }}" \
          immortalwrt/imagebuilder:$tag /bin/bash /home/build/immortalwrt/build.sh

      - name: Generate Release Info
        run: |
          cat > ${{ github.workspace }}/mediatek-filogic/info.md << EOF
          ## 固件信息
          - **机型**: ${{ github.event.inputs.profile }}
          - **管理地址**: ${{ github.event.inputs.custom_router_ip }}
          - **默认WiFi**: ${{ github.event.inputs.wifi_ssid }} / ${{ github.event.inputs.wifi_password }}
          - **双频合一**: 已启用（最终修复版，无迁移提示）
          - **无缝漫游**: 已启用802.11r/k/v/w
          $( [[ -n "${{ github.event.inputs.default_hostname }}" ]] && echo "- **默认主机名**: ${{ github.event.inputs.default_hostname }}" )
          $( [[ -n "${{ github.event.inputs.default_password }}" ]] && echo "- **默认root密码**: 已设置" )
          $( [[ "${{ github.event.inputs.enable_store }}" == "true" ]] && echo "- **集成功能**: iStore商店" )
          $( [[ "${{ github.event.inputs.enable_netbird }}" == "true" ]] && echo "- **集成功能**: NetBird内网穿透（预配置网络接口和防火墙）" )
          $( [[ "${{ github.event.inputs.include_docker }}" == "yes" ]] && echo "- **集成功能**: Docker容器" )
          EOF

      - name: Upload Firmware Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.profile }}
          name: ImmortalWrt-${{ github.event.inputs.profile }}
          body_path: ${{ github.workspace }}/mediatek-filogic/info.md
          files: ${{ github.workspace }}/bin/targets/${{ env.platform }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

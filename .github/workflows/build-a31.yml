# 纯 MT7981 (filogic) 平台专用构建工作流
# 仅支持：康佳Komi-A31、移动A10全系列
# 默认使用 luci 24.10.x 构建，特有机型自动切换 23.05.4
name: Build ImmortalWrt MT7981 (A31/A10 Only)

on:
  workflow_dispatch:
    inputs:
      profile:
        type: choice
        description: "请选择路由器型号"
        required: true
        options:
          - konka_komi-a31
          - cmcc_a10
          - cmcc_a10-stock
          - cmcc_a10-ubootmod
        default: konka_komi-a31
      custom_router_ip:
        description: "请设置路由器的管理地址 格式:192.168.x.1 或 10.x.x.1"
        required: true
        default: "192.168.100.1"
      default_hostname:
        description: "设置默认主机名 (不填则为 ImmortalWrt)"
        required: false
        default: ""
      default_password:
        description: "设置默认root密码 (留空则使用ImmortalWrt默认空密码)"
        required: false
        default: ""
      wifi_2g_ssid:
        description: "2.4G WiFi名称 (不填则不修改默认)"
        required: false
        default: ""
      wifi_2g_password:
        description: "2.4G WiFi密码 (至少8位，不填则不加密)"
        required: false
        default: ""
      wifi_5g_ssid:
        description: "5G WiFi名称 (不填则不修改默认)"
        required: false
        default: ""
      wifi_5g_password:
        description: "5G WiFi密码 (至少8位，不填则不加密)"
        required: false
        default: ""
      enable_store:
        description: "集成 store 商店"
        required: false
        type: boolean
        default: false
      enable_netbird:
        description: "集成 NetBird (自动匹配架构)"
        required: false
        type: boolean
        default: false
      include_docker:
        description: "是否编译 Docker 插件"
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      enable_pppoe:
        description: "是否配置PPPoE拨号信息?"
        required: true
        default: 'no'
        type: choice
        options:
          - 'yes'
          - 'no'
      pppoe_account:
        description: "宽带账号 (若启用PPPoE)"
        required: false
      pppoe_password:
        description: "宽带密码 (若启用PPPoE)"
        required: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set executable permissions
        run: chmod +x ${{ github.workspace }}/mediatek-filogic/build24.sh

      - name: Save Custom Router IP
        run: |
          mkdir -p "${{ github.workspace }}/custom"
          echo "${{ github.event.inputs.custom_router_ip }}" > "${{ github.workspace }}/custom/custom_router_ip.txt"

      - name: Validate PPPoE Inputs
        run: |
          if [[ "${{ inputs.enable_pppoe }}" == "yes" ]]; then
            [[ -z "${{ inputs.pppoe_account }}" || -z "${{ inputs.pppoe_password }}" ]] && exit 1
          fi

      - name: Enable iStore integration
        run: |
          if [ "${{ github.event.inputs.enable_store }}" == "true" ]; then
            echo 'CUSTOM_PACKAGES="$CUSTOM_PACKAGES luci-app-store"' >> shell/custom-packages.sh
          fi

      # MT7981 专属：自动下载 NetBird (aarch64_generic 架构)
      - name: Auto download NetBird IPK
        run: |
          if [ "${{ github.event.inputs.enable_netbird }}" == "true" ]; then
            mkdir -p ${{ github.workspace }}/shell/packages
            arch="aarch64_generic"
            
            # 下载对应架构IPK
            wget -q --tries=3 --timeout=10 \
              "https://github.com/tslxpc/openwrt-netbird/releases/download/v0.70.5/netbird_0.70.5-r1_${arch}.ipk" \
              -O "${{ github.workspace }}/shell/packages/netbird.ipk"
            
            # 添加依赖
            echo 'CUSTOM_PACKAGES="$CUSTOM_PACKAGES kmod-wireguard wireguard-tools"' >> shell/custom-packages.sh
            echo "✅ NetBird集成成功 | 架构: $arch"
          fi

      # 新增：生成默认root密码设置脚本
      - name: Generate Default Root Password Script
        run: |
          if [ -n "${{ github.event.inputs.default_password }}" ]; then
            # 创建uci-defaults脚本，固件首次启动时自动执行
            cat > "${{ github.workspace }}/glinet/99-set-root-password" << EOF
          #!/bin/sh
          # 自动设置默认root密码
          (echo "${{ github.event.inputs.default_password }}"; sleep 1; echo "${{ github.event.inputs.default_password }}") | passwd root > /dev/null
          # 删除自身，避免重复执行
          rm -f /etc/uci-defaults/99-set-root-password
          EOF
            chmod +x "${{ github.workspace }}/glinet/99-set-root-password"
            echo "✅ 默认root密码设置成功"
          fi

      # 新增：生成默认主机名和WiFi配置脚本
      - name: Generate Default Hostname & WiFi Script
        run: |
          # 初始化脚本内容
          SCRIPT_CONTENT="#!/bin/sh\n"
          SCRIPT_CONTENT+="# 自动设置默认主机名和WiFi参数\n\n"
          MODIFIED=false

          # 设置主机名
          if [ -n "${{ github.event.inputs.default_hostname }}" ]; then
            SCRIPT_CONTENT+="uci set system.@system[0].hostname='${{ github.event.inputs.default_hostname }}'\n"
            SCRIPT_CONTENT+="uci commit system\n"
            MODIFIED=true
            echo "✅ 默认主机名设置为: ${{ github.event.inputs.default_hostname }}"
          fi

          # 设置2.4G WiFi (radio0)
          if [ -n "${{ github.event.inputs.wifi_2g_ssid }}" ]; then
            SCRIPT_CONTENT+="uci set wireless.@wifi-iface[0].ssid='${{ github.event.inputs.wifi_2g_ssid }}'\n"
            SCRIPT_CONTENT+="uci set wireless.@wifi-iface[0].encryption='psk2'\n"
            if [ -n "${{ github.event.inputs.wifi_2g_password }}" ]; then
              SCRIPT_CONTENT+="uci set wireless.@wifi-iface[0].key='${{ github.event.inputs.wifi_2g_password }}'\n"
            fi
            SCRIPT_CONTENT+="uci set wireless.@wifi-iface[0].disabled='0'\n"
            MODIFIED=true
            echo "✅ 2.4G WiFi名称设置为: ${{ github.event.inputs.wifi_2g_ssid }}"
          fi

          # 设置5G WiFi (radio1)
          if [ -n "${{ github.event.inputs.wifi_5g_ssid }}" ]; then
            SCRIPT_CONTENT+="uci set wireless.@wifi-iface[1].ssid='${{ github.event.inputs.wifi_5g_ssid }}'\n"
            SCRIPT_CONTENT+="uci set wireless.@wifi-iface[1].encryption='psk2'\n"
            if [ -n "${{ github.event.inputs.wifi_5g_password }}" ]; then
              SCRIPT_CONTENT+="uci set wireless.@wifi-iface[1].key='${{ github.event.inputs.wifi_5g_password }}'\n"
            fi
            SCRIPT_CONTENT+="uci set wireless.@wifi-iface[1].disabled='0'\n"
            MODIFIED=true
            echo "✅ 5G WiFi名称设置为: ${{ github.event.inputs.wifi_5g_ssid }}"
          fi

          # 提交配置并删除脚本
          if [ "$MODIFIED" = true ]; then
            SCRIPT_CONTENT+="\nuci commit wireless\n"
            SCRIPT_CONTENT+="rm -f /etc/uci-defaults/99-set-hostname-wifi\n"
            # 写入脚本文件
            echo -e "$SCRIPT_CONTENT" > "${{ github.workspace }}/glinet/99-set-hostname-wifi"
            chmod +x "${{ github.workspace }}/glinet/99-set-hostname-wifi"
          fi

      - name: Build ImmortalWrt Firmware
        run: |
          profile="${{ github.event.inputs.profile }}"
          include_docker="${{ github.event.inputs.include_docker }}"
          # 固定为 MT7981 平台
          echo "platform=mediatek/filogic" >> $GITHUB_ENV
          tag="mediatek-filogic-openwrt-24.10.6"

          # 移动A10系列：自动切换 23.05.4
          case "$profile" in
            cmcc_a10|cmcc_a10-stock|cmcc_a10-ubootmod)
              tag=mediatek-filogic-openwrt-23.05.4
              cp ${{ github.workspace }}/mediatek-filogic/build23.sh ${{ github.workspace }}/mediatek-filogic/build24.sh ;;
          esac

          # 启动构建
          docker run --rm -i \
            --user root \
            -v "${{ github.workspace }}/bin:/home/build/immortalwrt/bin" \
            -v "${{ github.workspace }}/glinet:/home/build/immortalwrt/files/etc/uci-defaults" \
            -v "${{ github.workspace }}/custom:/home/build/immortalwrt/files/etc/config" \
            -v "${{ github.workspace }}/arch/arch.conf:/home/build/immortalwrt/files/etc/opkg/arch.conf" \
            -v "${{ github.workspace }}/shell:/home/build/immortalwrt/shell" \
            -v "${{ github.workspace }}/shell/packages:/home/build/immortalwrt/packages" \
            -v "${{ github.workspace }}/mediatek-filogic/build24.sh:/home/build/immortalwrt/build.sh" \
            -e PROFILE="$profile" \
            -e INCLUDE_DOCKER="$include_docker" \
            -e ENABLE_PPPOE="${{ inputs.enable_pppoe }}" \
            -e PPPOE_ACCOUNT="${{ inputs.pppoe_account }}" \
            -e PPPOE_PASSWORD="${{ inputs.pppoe_password }}" \
          immortalwrt/imagebuilder:$tag /bin/bash /home/build/immortalwrt/build.sh

      - name: Generate Release Info
        run: |
          cat > ${{ github.workspace }}/mediatek-filogic/info.md << EOF
          ### 机型: ${{ github.event.inputs.profile }}
          ### 管理地址: ${{ github.event.inputs.custom_router_ip }}
          $( [[ -n "${{ github.event.inputs.default_hostname }}" ]] && echo "- 已设置默认主机名: ${{ github.event.inputs.default_hostname }}" )
          $( [[ -n "${{ github.event.inputs.default_password }}" ]] && echo "- 已设置默认root密码" )
          $( [[ -n "${{ github.event.inputs.wifi_2g_ssid }}" ]] && echo "- 已设置默认2.4G WiFi: ${{ github.event.inputs.wifi_2g_ssid }}" )
          $( [[ -n "${{ github.event.inputs.wifi_5g_ssid }}" ]] && echo "- 已设置默认5G WiFi: ${{ github.event.inputs.wifi_5g_ssid }}" )
          $( [[ "${{ github.event.inputs.include_docker }}" == "yes" ]] && echo "- 已集成 Docker" )
          $( [[ "${{ github.event.inputs.enable_store }}" == "true" ]] && echo "- 已集成 iStore 商店" )
          $( [[ "${{ github.event.inputs.enable_netbird }}" == "true" ]] && echo "- 已集成 NetBird 内网穿透" )
          EOF

      - name: Upload Firmware Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.profile }}
          name: ImmortalWrt-${{ github.event.inputs.profile }}
          body_path: ${{ github.workspace }}/mediatek-filogic/info.md
          files: ${{ github.workspace }}/bin/targets/${{ env.platform }}/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
